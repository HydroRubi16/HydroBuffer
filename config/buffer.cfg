[force_move]
enable_force_move: True

############################################################
# FILAMENT SWITCH SENSORS
############################################################

[filament_switch_sensor Enter]
switch_pin: ^PF10
pause_on_runout: False
insert_gcode: LOAD_FILAMENT_START

[filament_switch_sensor Exit]
switch_pin: ^PC0
pause_on_runout: False

[filament_switch_sensor Trail]
switch_pin: ^PB15
pause_on_runout: False

[filament_switch_sensor Lead]
switch_pin: ^PB14
pause_on_runout: False


[duplicate_pin_override]
pins: PB14, PB15

[gcode_button _TRAIL_TRIGGER]
pin: ^PB15
press_gcode: 
    {% if printer.print_stats.state == "printing" %}
        SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=buffer DISTANCE=22.00
        RESPOND MSG="BUFFER: Fully Compressed" 
        M117 Buffer fully compressed   
    {% endif %}
debounce_delay: 1

[gcode_button _LEAD_TRIGGER]
pin: ^PB14
press_gcode: 
    {% if printer.print_stats.state == "printing" %}
        SET_EXTRUDER_ROTATION_DISTANCE EXTRUDER=buffer DISTANCE=23.5
        RESPOND MSG="BUFFER: Extended" 
        M117 Buffer fully extended
    {% endif %}
debounce_delay: 1



############################################################
# SECONDARY EXTRUDER - BUFFER
############################################################
[extruder_stepper buffer]
extruder: extruder
step_pin: !PC13
dir_pin: !PC14
enable_pin: !PE6
microsteps: 32 
rotation_distance: 22.811
gear_ratio: 50:10
full_steps_per_rotation: 200


[tmc2209 extruder_stepper buffer]
uart_pin: PG14
interpolate: false
run_current: 0.60
sense_resistor: 0.110
stealthchop_threshold: 0

############################################################
[save_variables]
filename: ~/printer_data/config/saved_variables.cfg
############################################################

############################################################
# FILAMENT LOAD STATE HOLDER
############################################################

[gcode_macro _FILAMENT_LOAD_STATE]
variable_loading: False
variable_stage1_traveled: 0
variable_stage3_traveled: 0
gcode:
    # State holder only, not called directly

############################################################
# LOAD FILAMENT START
# Triggered by Enter sensor insert_gcode
############################################################

[gcode_macro LOAD_FILAMENT_START]
description: "Triggered by Enter sensor - begins filament load sequence"
gcode:
    SET_TMC_CURRENT STEPPER=buffer CURRENT=0.80
    {% set svv = printer.save_variables.variables %}
    {% set filament_status = svv.filament_status | default('unloaded') %}

    {% if filament_status == 'loaded' %}
        RESPOND MSG="LOAD: Filament already loaded - ignoring trigger"

    {% elif printer["gcode_macro _FILAMENT_LOAD_STATE"].loading == False %}
        SAVE_VARIABLE VARIABLE=filament_status VALUE='"loading"'
        SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=loading VALUE=True
        SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage1_traveled VALUE=0
        SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage3_traveled VALUE=0
        RESPOND MSG="LOAD: Filament detected at Enter - starting Stage 1 slow feed"
        M117 Stage 1: Slow feed to Exit sensor...
        _FILAMENT_LOAD_STAGE1

    {% else %}
        RESPOND MSG="LOAD: Already loading, ignoring trigger"
    {% endif %}

############################################################
# STAGE 1: Kick off slow feed loop to Exit sensor
############################################################

[gcode_macro _FILAMENT_LOAD_STAGE1]
description: "Kick off Stage 1 delayed_gcode loop"
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage1_traveled VALUE=0
    RESPOND MSG="LOAD: Stage 1 starting..."
    UPDATE_DELAYED_GCODE ID=_STAGE1_LOOP DURATION=0.1

############################################################
# STAGE 1 LOOP: 2mm at a time until Exit sensor triggers
# Max 50mm before jam abort - tune to your buffer size
############################################################

[delayed_gcode _STAGE1_LOOP]
gcode:
    {% set traveled = printer["gcode_macro _FILAMENT_LOAD_STATE"].stage1_traveled %}
    {% set max_dist = 50 %}
    {% set step = 2 %}
    {% set velocity = 10 %}

    {% if printer['filament_switch_sensor Exit'].filament_detected == True %}
        RESPOND MSG="LOAD: Exit sensor triggered at {traveled}mm - starting Stage 2"
        M117 Stage 2: Fast feed fixed distance...
        _FILAMENT_LOAD_STAGE2

    {% elif traveled >= max_dist %}
        RESPOND MSG="LOAD ERROR: Exit sensor not triggered after {traveled}mm - possible jam! Aborting."
        M117 LOAD ERROR - Check filament!
        _FILAMENT_LOAD_ABORT

    {% else %}
        FORCE_MOVE STEPPER="extruder_stepper buffer" DISTANCE={step} VELOCITY={velocity}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage1_traveled VALUE={ traveled + step }
        UPDATE_DELAYED_GCODE ID=_STAGE1_LOOP DURATION=0.1
    {% endif %}

############################################################
# STAGE 2: Fast feed fixed distance to extruder gears
############################################################

[gcode_macro _FILAMENT_LOAD_STAGE2]
description: "Fast feed fixed distance toward toolhead"
variable_fast_distance: 875 #Need to test the length you need
variable_velocity: 150 #Tune this
variable_accel: 500 #Tune this
gcode:
    RESPOND MSG="LOAD: Stage 2 fast feed {fast_distance}mm at {velocity}mm/s"
    FORCE_MOVE STEPPER="extruder_stepper buffer" DISTANCE={fast_distance} VELOCITY={velocity} ACCEL={accel}
    RESPOND MSG="LOAD: Stage 2 complete - starting Stage 3 slow feed"
    M117 Stage 3: Slow feed to Lead sensor...
    _FILAMENT_LOAD_STAGE3

############################################################
# STAGE 3: Kick off slow feed loop to Lead sensor
############################################################

[gcode_macro _FILAMENT_LOAD_STAGE3]
description: "Kick off Stage 3 delayed_gcode loop"
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage3_traveled VALUE=0
    RESPOND MSG="LOAD: Stage 3 starting..."
    UPDATE_DELAYED_GCODE ID=_STAGE3_LOOP DURATION=0.1

############################################################
# STAGE 3 LOOP: 2mm at a time until Lead sensor triggers
# Max 100mm before jam abort - tune to your buffer size
############################################################

[delayed_gcode _STAGE3_LOOP]
gcode:
    {% set traveled = printer["gcode_macro _FILAMENT_LOAD_STATE"].stage3_traveled %}
    {% set max_dist = 100 %} #Max distance for ramming, for safety and stuff
    {% set step = 2 %}
    {% set velocity = 6 %}

    {% if printer['filament_switch_sensor Lead'].filament_detected == True %}
        RESPOND MSG="LOAD: Lead sensor triggered at {traveled}mm - starting Stage 4 purge"
        M117 Stage 4: Purging 50mm...
        _FILAMENT_LOAD_STAGE4

    {% elif traveled >= max_dist %}
        RESPOND MSG="LOAD ERROR: Lead sensor not triggered after {traveled}mm - possible jam! Aborting."
        M117 LOAD ERROR - Check filament!
        _FILAMENT_LOAD_ABORT

    {% else %}
        FORCE_MOVE STEPPER="extruder_stepper buffer" DISTANCE={step} VELOCITY={velocity}
        SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage3_traveled VALUE={ traveled + step }
        UPDATE_DELAYED_GCODE ID=_STAGE3_LOOP DURATION=0.1
    {% endif %}

###################################################################
# STAGE 4: Final load to HE cold side using FORCE_MOVE on extruder
###################################################################

[gcode_macro _FILAMENT_LOAD_STAGE4]
description: "Final 50mm load to HE cold side"
variable_purge_distance: 50     #Change for your toolhead, tune this
variable_velocity: 10           #Tune this
gcode:
    RESPOND MSG="LOAD: Purging {purge_distance}mm..."
    FORCE_MOVE STEPPER=extruder DISTANCE={purge_distance} VELOCITY={velocity}
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=loading VALUE=False
    SAVE_VARIABLE VARIABLE=filament_status VALUE='"loaded"'
    SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=0
    SET_TMC_CURRENT STEPPER=buffer CURRENT=0.60
    RESPOND MSG="LOAD: Complete! Filament status saved as 'loaded'. Enter sensor disabled."
    M117 Filament loaded!

[gcode_macro _FILAMENT_LOAD_ABORT]
description: "Abort filament load and reset state"
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=loading VALUE=False
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage1_traveled VALUE=0
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage3_traveled VALUE=0
    SAVE_VARIABLE VARIABLE=filament_status VALUE='"unloaded"'
    SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=1
    RESPOND MSG="LOAD: Aborted - check filament for jam!"
    M117 Load aborted - check filament!

[gcode_macro SET_FILAMENT_UNLOADED]
description: "Manually mark filament as unloaded"
gcode:
    SAVE_VARIABLE VARIABLE=filament_status VALUE='"unloaded"'
    SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=1
    RESPOND MSG="Filament status manually set to 'unloaded' - Enter sensor re-enabled"

############################################################
# ABORT: Called on jam detection
############################################################

[gcode_macro _FILAMENT_LOAD_ABORT]
description: "Abort filament load and reset state"
gcode:
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=loading VALUE=False
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage1_traveled VALUE=0
    SET_GCODE_VARIABLE MACRO=_FILAMENT_LOAD_STATE VARIABLE=stage3_traveled VALUE=0
    SAVE_VARIABLE VARIABLE=filament_status VALUE='"unloaded"'
    RESPOND MSG="LOAD: Aborted - check filament for jam!"
    M117 Load aborted - check filament!

############################################################
# MANUAL STATUS OVERRIDES
# Run these from the console when needed
############################################################

[gcode_macro SET_FILAMENT_LOADED]
description: "Manually mark filament as loaded"
gcode:
    SAVE_VARIABLE VARIABLE=filament_status VALUE='"loaded"'
    RESPOND MSG="Filament status manually set to 'loaded'"

[gcode_macro SET_FILAMENT_UNLOADED]
description: "Manually mark filament as unloaded"
gcode:
    SAVE_VARIABLE VARIABLE=filament_status VALUE='"unloaded"'
    RESPOND MSG="Filament status manually set to 'unloaded'"

[gcode_macro GET_FILAMENT_STATUS]
description: "Check current filament status"
gcode:
    {% set status = printer.save_variables.variables.filament_status | default('unloaded') %}
    RESPOND MSG="Filament status: {status}"

########################################
###To disable insert macro on startup###
########################################
[delayed_gcode _FILAMENT_STATUS_INIT]
initial_duration: 2
gcode:
    {% set status = printer.save_variables.variables.filament_status | default('unloaded') %}
    {% if status == 'loaded' %}
        SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=0
        RESPOND MSG="INIT: Filament status is 'loaded' - Enter sensor disabled"
    {% else %}
        SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=1
        RESPOND MSG="INIT: Filament status is 'unloaded' - Enter sensor enabled"
    {% endif %}

############################################################
# UNLOAD FILAMENT
# Stage 1: Slow retract to clear toolhead
# Stage 2: Fast retract to clear buffer
# Stage 3: Wait 5 seconds then re-enable Enter sensor
############################################################
[gcode_macro UNLOAD_FILAMENT]
description: "Retract filament from toolhead then fast retract through buffer"
variable_slow_distance: 75       #To remove from toolhead, tune this
variable_slow_speed: 7           #MM/S
variable_fast_distance: 950      #Unload distance, tune this
variable_fast_velocity: 150      #MM/S
variable_fast_accel: 500         #Tune this
gcode:
    SET_TMC_CURRENT STEPPER=buffer CURRENT=0.80
    {% set svv = printer.save_variables.variables %}
    {% set filament_status = svv.filament_status | default('unloaded') %}

    {% if filament_status == 'unloaded' %}
        RESPOND MSG="UNLOAD: Filament is already unloaded - ignoring"
    {% else %}
        RESPOND MSG="UNLOAD: Starting filament unload..."
        SAVE_VARIABLE VARIABLE=filament_status VALUE='"unloading"'
        SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=0
        M117 Unloading - clearing toolhead...

        # Stage 1: Slow retract to clear toolhead
        RESPOND MSG="UNLOAD: Stage 1 - slow retract 75mm at 7mm/s"
        G92 E0
        G1 E-{slow_distance} F{slow_speed * 60}

        # Stage 2: Fast retract to clear buffer
        RESPOND MSG="UNLOAD: Stage 2 - fast retract 800mm at 30mm/s"
        M117 Unloading - fast retract...
        FORCE_MOVE STEPPER="extruder_stepper buffer" DISTANCE=-{fast_distance} VELOCITY={fast_velocity} ACCEL={fast_accel}

        # Save state and schedule sensor re-enable
        SAVE_VARIABLE VARIABLE=filament_status VALUE='"unloaded"'
        SET_TMC_CURRENT STEPPER=buffer CURRENT=0.60
        RESPOND MSG="UNLOAD: Complete - waiting 5 seconds before re-enabling Enter sensor..."
        M117 Unload complete - standby...
        UPDATE_DELAYED_GCODE ID=_UNLOAD_ENTER_ENABLE DURATION=5
    {% endif %}

[delayed_gcode _UNLOAD_ENTER_ENABLE]
gcode:
    SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=1
    RESPOND MSG="UNLOAD: Enter sensor re-enabled. Ready to load new filament."
    M117 Ready to load filament!

[delayed_gcode _UNLOAD_ENTER_ENABLE]
gcode:
    SET_FILAMENT_SENSOR SENSOR=Enter ENABLE=1
    RESPOND MSG="UNLOAD: Enter sensor re-enabled. Ready to load new filament."
    M117 Ready to load filament!